name: email-agent-env
description: RL-style environment simulating real-world email triage for agent decision-making
version: 0.1
environment: env:EmailEnv
observation_space:
  type: object
  properties:
    email_id:
      type: integer
    subject:
      type: string
    body:
      type: string
    sender:
      type: string

action_space:
  type: object
  properties:
    category:
      type: string
      enum: ["work", "spam", "personal"]
    priority:
      type: string
      enum: ["high", "medium", "low"]
    response:
      type: string

reward_space:
  type: object
  properties:
    score:
      type: number
      minimum: 0.01
      maximum: 0.99
    feedback:
      type: string

# 🔥 ADD THIS (VERY IMPORTANT)
tasks:
  - id: easy_classification
    description: Classify emails into correct category
    grader: grader:grade_step
    weight: 0.3

  - id: medium_priority
    description: Assign correct priority level
    grader: grader:grade_step
    weight: 0.3

  - id: hard_full_action
    description: Full email handling
    grader: grader:grade_step
    weight: 0.4

# 🔥 ADD THIS
reward_range: [0.01, 0.99]

# 🔥 ADD THIS
difficulty: progressive
