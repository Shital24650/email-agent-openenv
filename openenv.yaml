name: email-agent-env
description: RL-style environment simulating real-world email triage for agent decision-making
version: 0.1

# ✅ Environment mapping (MUST match env.py)
environment: env:EmailEnv

# ✅ Observation Space
observation_space:
  type: object
  properties:
    email_id:
      type: integer
    subject:
      type: string
    body:
      type: string
    sender:
      type: string

# ✅ Action Space
action_space:
  type: object
  properties:
    category:
      type: string
      enum: ["work", "spam", "personal"]
    priority:
      type: string
      enum: ["high", "medium", "low"]
    response:
      type: string

# ✅ Reward Space
reward_space:
  type: object
  properties:
    score:
      type: number
      minimum: 0.0
      maximum: 1.0
    feedback:
      type: string

tasks:
  - id: easy_classification
    description: Classify email category correctly
    grader: grader:grade_step
    input:
      email_id: 101
      subject: "Win a free iPhone"
      body: "Click here to claim your prize"
      sender: "spam@promo.com"
    expected:
      category: "spam"
      priority: "low"
      response: ""

  - id: medium_priority
    description: Assign correct priority
    grader: grader:grade_step
    input:
      email_id: 102
      subject: "Meeting tomorrow"
      body: "Join at 10 AM"
      sender: "manager@company.com"
    expected:
      category: "work"
      priority: "medium"
      response: ""

  - id: hard_full_action
    description: Full email handling
    grader: grader:grade_step
    input:
      email_id: 103
      subject: "URGENT: Server down"
      body: "Fix immediately"
      sender: "client@company.com"
    expected:
      category: "work"
      priority: "high"
      response: "We are working on it"

# ✅ REQUIRED FOR VALIDATION
reward_range: [0.0, 1.0]
