name: email-agent-env
description: RL-style environment simulating real-world email triage for agent decision-making
version: 0.1

observation_space:
  type: object
  properties:
    email_id:
      type: integer
    subject:
      type: string
    body:
      type: string
    sender:
      type: string

action_space:
  type: object
  properties:
    category:
      type: string
      enum: ["work", "spam", "personal"]
    priority:
      type: string
      enum: ["high", "medium", "low"]
    response:
      type: string

reward_space:
  type: object
  properties:
    score:
      type: number
      minimum: 0.01
      maximum: 0.99
    feedback:
      type: string

# 🔥 ADD THIS (VERY IMPORTANT)
tasks:
  - name: easy_classification
    description: Classify emails into correct category (work, spam, personal)
    grader: grader.grade_step
    score: 0.3
    
  - name: medium_priority
    description: Classify emails and assign correct priority level
    grader: grader.grade_step
    score: 0.6

  - name: hard_full_action
    description: Classify, prioritize, and generate meaningful response
    grader: grader.grade_step
    score: 0.9

# 🔥 ADD THIS
reward_range: [0.01, 0.99]

# 🔥 ADD THIS
difficulty: progressive
